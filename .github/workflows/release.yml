name: Release APK

# Push a version tag to build a signed APK and attach it to the matching release:
#   ./gradlew ...        # (bump versionCode/versionName in app/build.gradle first)
#   git tag v1.2 && git push origin v1.2
# The manual "Run workflow" button builds + signs and uploads an artifact WITHOUT
# creating a release, so you can verify signing without publishing.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > appmanager-release.jks

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=appmanager-release.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Name the APK
        id: apk
        run: |
          NAME="AppManager-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Clean up signing material
        if: always()
        run: rm -f appmanager-release.jks keystore.properties

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.name }}

      - name: Attach APK to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.name }}
          name: App Manager ${{ github.ref_name }}
          generate_release_notes: true
